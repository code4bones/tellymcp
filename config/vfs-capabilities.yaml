      roles: [admin, manager]
    name:
      roles: [admin, manager]
    mime:
      roles: [admin, manager]
    size:
      roles: [admin, manager]
    visibility:
      roles: [admin, manager]
    created:
      roles: [admin, manager]
    devel:
      roles: [admin, manager]
    open:
      roles: [admin, manager]
    download:
      roles: [admin, manager]
    preview:
      roles: [admin, manager]
