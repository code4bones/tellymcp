vfs:
  default_scope: fs
  scope_visible: true

ui:
  tree_toolbar: true
  content_toolbar: true

capabilities:
  scope_create:
    roles: [admin]

  create:
    roles: [admin, manager]

  upload:
    roles: [admin, manager]

  rename:
    roles: [admin, manager]

  move:
    roles: [admin, manager]

  delete:
    roles: [admin, manager]

  access:
    roles: [admin, manager]

  acl_index:
    roles: [admin, manager]

  tiles_index:
    roles: [admin, manager]

  tiles_delete:
    roles: [admin, manager]

  tools_inspect:
    roles: [admin, manager]

  file_inspector:
