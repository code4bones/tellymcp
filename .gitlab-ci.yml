stages:
  - build
  - deploy

build:package:
  stage: build
  tags:
    - france
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+$/'
  script:
    - bash scripts/build-package-artifact.sh
  artifacts:
    expire_in: 7 days
    paths:
      - deadragdoll-tellymcp-*.tgz

deploy:gateway:
  stage: deploy
  tags:
    - france
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+$/'
  needs:
    - job: build:package
      artifacts: true
  script:
    - bash scripts/deploy-gateway.sh
