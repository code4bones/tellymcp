stages:
  - build
  - deploy

build:package:
  stage: build
  tags:
    - france
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+$/'
  script:
    - bash scripts/build-package-artifact.sh
  artifacts:
    expire_in: 7 days
    paths:
      - deadragdoll-tellymcp-*.tgz

deploy:gateway:
  stage: deploy
  tags:
    - france
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+$/'
  needs:
    - job: build:package
      artifacts: true
  script:
    - bash scripts/deploy-gateway.sh

build:onebot:
  stage: build
  tags:
    - france
  rules:
    - if: '$CI_COMMIT_BRANCH == "onebot"'
  script:
    - yarn install --frozen-lockfile
    - yarn lint
    - yarn test
    - yarn build
    - npm pack
  artifacts:
    expire_in: 1 day
    paths:
      - deadragdoll-tellymcp-*.tgz

deploy:onebot:
  stage: deploy
  tags:
    - france
  rules:
    - if: '$CI_COMMIT_BRANCH == "onebot"'
  needs:
    - job: build:onebot
      artifacts: true
  script:
    - bash scripts/deploy-onebot-branch.sh
