# Example nginx vhost for a gateway-only or both-mode TellyMCP node.
#
# Drop this into something like:
#   /etc/nginx/conf.d/tellymcp.gw.conf
#
# Assumptions:
# - TellyMCP listens on 127.0.0.1:8080
# - ROOT_PREFIX=/api
# - public host is tellymcp.undoo.ru
# - TLS is terminated elsewhere, or you will add your own listen 443 / cert config

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream tellymcp_gateway_upstream {
    server 127.0.0.1:8090;
    keepalive 32;
}

server {
    # listen      443 ssl;

    server_name drd.undoo.ru;

    # Connector diagnostics, including requests rejected before they reach Node.
    access_log /var/log/nginx/tellymcp.access.log combined;
    error_log /var/log/nginx/tellymcp.error.log warn;

    # ssl_certificate     /etc/letsencrypt/live/drd.undoo.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/drd.undoo.ru/privkey.pem;
    # ssl_session_timeout 1d;
    # ssl_session_cache   shared:MozSSL:10m;  # about 40000 sessions
    # ssl_session_tickets off;

    # Supports Firefox 27, Android 4.4.2, Chrome 31, Edge, IE 11 on Windows 7,
    # Java 8u31, OpenSSL 1.0.1, Opera 20, and Safari 9 and above
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
                                              
    # HSTS (ngx_http_headers_module is required) (63072000 seconds)
    # add_header Strict-Transport-Security "max-age=63072000" always;
 
    # OCSP stapling
    # ssl_stapling on;
    # ssl_stapling_verify on;

    client_max_body_size 32m;

    # Gateway websocket used by distributed clients.
    location /api/gateway/ws {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/gateway/live/ws {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # MCP streamable HTTP endpoint:
    # disable proxy buffering so long-lived SSE/stream responses are not coalesced or cut early.
    location ~ ^/api/mcp/?$ {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        gzip off;
        add_header X-Accel-Buffering no;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # OAuth discovery for Claude and other clients using RFC 8414
    # path-insertion discovery with the /api issuer path.
    location ~ ^/\.well-known/(oauth-authorization-server|openid-configuration|oauth-protected-resource)/api(/.*)?$ {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # OAuth protected-resource discovery under the public /api prefix.
    location = /api/.well-known/oauth-protected-resource {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location ^~ /api/.well-known/oauth-protected-resource/ {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /api/.well-known/oauth-authorization-server {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /api/.well-known/jwks.json {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /api/oauth/authorize {
        client_max_body_size 64k;
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /api/oauth/token {
        limit_except POST { deny all; }
        client_max_body_size 64k;
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Everything else under /api goes to the same standalone HTTP listener:
    # - /api/webapp
    # - /api/gateway
    # - /api/healthz
    location /api/ {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/drd.undoo.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/drd.undoo.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = drd.undoo.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen      80;

    server_name drd.undoo.ru;
    return 404; # managed by Certbot


}
