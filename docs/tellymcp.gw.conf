# Example nginx vhost for a gateway-only or both-mode TellyMCP node.
#
# Drop this into something like:
#   /etc/nginx/conf.d/tellymcp.gw.conf
#
# Assumptions:
# - TellyMCP listens on 127.0.0.1:8080
# - ROOT_PREFIX=/api
# - public host is builder.example.com
# - TLS is terminated elsewhere, or you will add your own listen 443 / cert config

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream tellymcp_gateway_upstream {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name builder.example.com;

    client_max_body_size 32m;

    # Gateway websocket used by distributed clients.
    location /api/gateway/ws {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Short-lived file uploads/downloads used by get_file(type="url").
    # Tokens are carried in the URL, so keep this route out of access logs.
    location ^~ /api/files/ {
        access_log off;
        client_max_body_size 32m;
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # MCP streamable HTTP endpoint:
    # disable proxy buffering so long-lived SSE/stream responses are not coalesced or cut early.
    location ~ ^/api/mcp/?$ {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        gzip off;
        add_header X-Accel-Buffering no;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # OAuth discovery for path-prefixed issuers. Claude may use these RFC 8414
    # path-insertion URLs instead of discovery below /api/.well-known/.
    location ~ ^/\.well-known/(oauth-authorization-server|openid-configuration|oauth-protected-resource)/api(/.*)?$ {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Everything else under /api goes to the same standalone HTTP listener:
    # - /api/webapp
    # - /api/gateway
    # - /api/healthz
    location /api/ {
        proxy_pass http://tellymcp_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
